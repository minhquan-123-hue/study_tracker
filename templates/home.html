<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Study Tracker - Home</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 2rem; }
      .box { max-width: 420px; margin: 2rem 0; }
      input[type="number"]{ width: 100%; padding: 0.5rem; font-size: 1rem; }
      button { margin-top: 0.5rem; padding: 0.5rem 1rem; font-size: 1rem; }
    </style>
  </head>
  <body>
    <h1>Study Tracker</h1>

    <div class="box">
      <form action="/submit" method="post">
        <label for="hours">Enter study hours:</label>
        <input id="hours" name="hours" type="number" min="0" step="1" required>
        <button type="submit">Submit Hours</button>
      </form>
    </div>
  </body>
</html>
